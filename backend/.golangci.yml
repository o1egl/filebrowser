linters-settings:
  depguard:
    list-type: blacklist
    packages:
      # logging is allowed only by log.Logger
      # zap is allowed to use only in log package
      - go.uber.org/zap
      - log
    packages-with-error-message:
      - go.uber.org/zap: "logging is allowed only by filebrowser/log"
      - log: "please use filebrowser/log"
  dupl:
    threshold: 100
  exhaustive:
    default-signifies-exhaustive: false
  funlen:
    lines: 100
    statements: 50
  gci:
    local-prefixes: github.com/filebrowser/filebrowser
  goconst:
    min-len: 2
    min-occurrences: 2
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport # https://github.com/go-critic/go-critic/issues/845
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/filebrowser/filebrowser
  golint:
    min-confidence: 0
  gomnd:
    settings:
      mnd:
        # don't include the "operation" and "assign"
        checks: argument,case,condition,return
  govet:
    check-shadowing: true
    settings:
      printf:
        funcs:
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Debugf
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Infof
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Warnf
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Errorf
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Criticalf
          - (github.com/filebrowser/filebrowser/v3/log.Logger).Fatalf
          - (github.com/cockroachdb/errors).Wrapf
          - (github.com/cockroachdb/errors).Errorf
  lll:
    line-length: 140
  maligned:
    suggest-new: true
  misspell:
    locale: US
  nolintlint:
    allow-leading-space: true # don't require machine-readable nolint directives (i.e. with no leading space)
    allow-unused: false # report any unused nolint directives
    require-explanation: false # don't require an explanation for nolint directives
    require-specific: false # don't require nolint directives to be specific about which linter is being skipped

linters:
  # please, do not use `enable-all`: it's deprecated and will be removed soon.
  # inverted configuration with `enable-all` and `disable` is not scalable during updates of golangci-lint
  disable-all: true
  enable:
    - bodyclose
    - deadcode
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exportloopref
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gomnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - structcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - varcheck
    - whitespace
    - prealloc
    - revive

issues:
  exclude-rules:
    - path: cmd/.*.go
      linters:
        - gochecknoinits
    - path: log/.*.go
      linters:
        - gochecknoinits
    - path: .*_test.go
      linters:
        - lll
        - gochecknoinits
        - gocyclo
        - funlen
        - dupl
        - scopelint
    - text: "Auther"
      linters:
        - misspell
    - text: 'declaration of "err"'
      linters:
        - govet

run:
  timeout: 5m
  skip-dirs:
    - var/
